name: openclaw-guardian
options:
  bundleIdPrefix: ai.zhongshu
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: OpenClaw Guardian
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    ENABLE_HARDENED_RUNTIME: YES

targets:
  openclaw-guardian:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: Sources/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: ai.zhongshu.openclaw-guardian
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        LSUIElement: YES
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleName: OpenClaw Guardian
        CFBundleDisplayName: OpenClaw Guardian
        CFBundleIdentifier: ai.zhongshu.openclaw-guardian
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: openclaw-guardian
        LSMinimumSystemVersion: "13.0"
        LSUIElement: true
        NSHighResolutionCapable: true
        NSPrincipalClass: NSApplication
